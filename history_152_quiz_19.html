<title>Practice: abeka_history_docs_lesson_152_quiz_19</title><style>
:root{--blue:#164e7a;--good:#176b3a;--bad:#a12622;--warn:#825900;--bg:#f4f7fa}*{box-sizing:border-box}body{font:16px system-ui,sans-serif;background:var(--bg);margin:0;color:#17212b}main{max-width:980px;margin:auto;padding:24px}h1{margin:.1em 0}.toolbar,.modes,.actions{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}button{border:0;border-radius:6px;padding:9px 13px;background:var(--blue);color:white;font-weight:650;cursor:pointer}button.secondary{background:#536273}button:disabled{background:#9aa6b2;cursor:not-allowed}button.active{outline:3px solid #8ec5ee}.choice{display:block;width:100%;margin:8px 0;text-align:left;background:#365f83}.card{background:white;border:1px solid #d7dfe7;border-radius:9px;padding:16px;margin:12px 0}.question{font-weight:650;font-size:1.06em}.page,small{color:#536273;font-size:.9em}input[type=text]{display:block;width:100%;padding:10px;margin:10px 0;border:1px solid #aab8c5;border-radius:5px;font-size:1em}.feedback{font-weight:650;margin-top:8px}.correct{color:var(--good)}.wrong{color:var(--bad)}.format,.spelling{color:var(--warn)}.hidden{display:none}.status{background:#e8f1f8;padding:10px;border-radius:6px}.mastered,.reviewed{background:#e9f5ed}.lock{background:#fff3d5;padding:10px;border-radius:6px}
</style></head><body><main><h1 id="title"></h1><p>Study answers must be exact, including spelling, capitalization, punctuation, spacing, and accents. Quiz mode unlocks after every study item is mastered.</p><div class="modes"><button id="studyMode">Study mode</button><button id="quizMode">Multiple-choice quiz</button><button id="toughMode" class="secondary">Toughest questions</button></div><div class="toolbar"><button id="skipStudy" class="secondary">Skip to quiz</button><button id="export" class="secondary">Export progress</button><label><button id="importButton" class="secondary" type="button">Import progress</button><input id="importFile" class="hidden" type="file" accept="application/json"></label><button id="reset" class="secondary">Reset progress</button></div><div id="content"></div></main><script id="study-data" type="application/json">{"id":"abeka_history_docs_lesson_152_quiz_19","title":"History, Lesson 152, Q19, Ch. 19, pp. 535, 550–551","questions":[{"num":"1","page":"450","question":"Who was hiding in Afghanistan?","type":"auto","answer":"Osama bin Laden","choices":["Osama bin Laden","Saddam Hussein","Manuel Noriega","Kim Jong-un"]},{"num":"2","page":"452–453","question":"What was built at ground zero as a memorial to those who died in the 9/11 terrorist attack in New York City?","type":"auto","answer":"9/11 Memorial","choices":["9/11 Memorial","One World Trade Center","Pentagon Memorial","Statue of Liberty"]},{"num":"3","page":"454","question":"Who was the first female to serve as Speaker of the House?","type":"auto","answer":"Nancy Pelosi","choices":["Nancy Pelosi","Condoleezza Rice","Madeleine Albright","Hillary Clinton"]},{"num":"4","page":"458","question":"Which president signed the Affordable Care Act into law?","type":"auto","answer":"Obama","choices":["Obama","George W. Bush","Bill Clinton","Donald Trump"]},{"num":"5","page":"454","question":"Which hurricane flooded much of New Orleans, Louisiana, in 2005?","type":"auto","answer":"Katrina","choices":["Katrina","Ivan","Sandy","Harvey"]},{"num":"6","page":"460","question":"What can be accessed using a smartphone?","type":"auto","answer":"World Wide Web","choices":["World Wide Web","Department of Homeland Security","hybrid car","self-driving car"]},{"num":"7","page":"460","question":"What kind of car uses both electricity and gasoline for power?","type":"auto","answer":"hybrid car","choices":["hybrid car","electric car","self-driving car","sports car"]},{"num":"8","page":"447","question":"On September 11, after the towers were struck, what building did a third plane hit?","type":"auto","answer":"Pentagon","choices":["Pentagon","White House","Capitol Building","One World Trade Center"]},{"num":"9","page":"466–467","question":"Who was president during the 9/11 attacks?","type":"auto","answer":"George W. Bush","choices":["George W. Bush","Barack Obama","Bill Clinton","Donald Trump"]},{"num":"10","page":"448","question":"What department did President Bush start?","type":"auto","answer":"Homeland Security","choices":["Homeland Security","Cyber Security","Department of Energy","Pentagon"]},{"num":"11","page":"535","question":"Be able to identify Alaska on a map.","type":"map"},{"num":"12","page":"535","question":"Be able to identify California on a map.","type":"map"},{"num":"13","page":"535","question":"Be able to identify Montana on a map.","type":"map"},{"num":"14","page":"535","question":"Be able to identify Washington on a map.","type":"map"},{"num":"15","page":"535","question":"Be able to identify Wyoming on a map.","type":"map"},{"num":"16","page":"550–551","question":"What is the capital of Alaska?","type":"auto","answer":"Juneau","choices":["Juneau","Cheyenne","Helena","Honolulu"]},{"num":"17","page":"550–551","question":"What is the capital of California?","type":"auto","answer":"Sacramento","choices":["Sacramento","Denver","Dover","Hartford"]},{"num":"18","page":"550–551","question":"What is the capital of Montana?","type":"auto","answer":"Helena","choices":["Helena","Cheyenne","Juneau","Olympia"]},{"num":"19","page":"550–551","question":"What is the capital of Washington?","type":"auto","answer":"Olympia","choices":["Olympia","Sacramento","Juneau","Helena"]},{"num":"20","page":"550–551","question":"What is the capital of Wyoming?","type":"auto","answer":"Cheyenne","choices":["Cheyenne","Helena","Honolulu","Juneau"]}]}</script><script>
const STUDY=JSON.parse(document.getElementById('study-data').textContent),VERSION='3408705427ab',KEY='abeka-practice:'+STUDY.id+':'+VERSION,SKIP_PASSWORD='abc123';
const fresh=()=>({answers:{},reviews:{},stats:{study:{},quiz:{}},quiz:{queue:[],current:null,started:false}});let state=fresh();
function load(){try{const value=JSON.parse(localStorage.getItem(KEY));if(value&&value.stats&&value.stats.study&&value.stats.quiz)state={...fresh(),...value,stats:{...fresh().stats,...value.stats}}}catch(e){}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function byNum(n){return STUDY.questions.find(q=>q.num===String(n))}function auto(){return STUDY.questions.filter(q=>q.type==='auto')}function stat(mode,n){const group=state.stats[mode],s=group[n]||(group[n]={correct:0,wrong:0,format:0,spelling:0});return s}function mastered(q){return (stat('study',q.num).correct||0)>0}function unlocked(){return STUDY.questions.every(q=>q.type==='auto'?mastered(q):state.reviews[q.num])}
function norm(s){return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^\p{L}\p{N}]/gu,'')}function distance(a,b){const d=Array.from({length:a.length+1},(_,i)=>[i]);for(let j=1;j<=b.length;j++)d[0][j]=j;for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[a.length][b.length]}function grade(q,value){if(value===q.answer)return 'correct';const a=norm(value),b=norm(q.answer);if(a===b)return 'format';const threshold=b.length<=4?1:b.length<=10?2:Math.min(4,Math.floor(b.length*.2));return a&&distance(a,b)<=threshold?'spelling':'wrong'}function text(result){return {correct:'Correct — mastered!',format:'Formatting error — check capitalization, punctuation, spacing, or accents.',spelling:'Spelling error — check the spelling carefully.',wrong:'Not correct. Try again.'}[result]}function shuffle(items){const copy=[...items];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function feedback(el,result){el.className='feedback '+result;el.textContent=text(result)}function controls(){const ready=unlocked(),button=document.getElementById('quizMode');button.disabled=!ready;button.title=ready?'':'Master every study item first.'}function studyCount(){return auto().filter(mastered).length}
function renderStudy(){controls();const root=document.getElementById('content');root.innerHTML='';const status=document.createElement('div');status.className=unlocked()?'status mastered':'status lock';status.textContent=unlocked()?'Study phase complete. Multiple-choice quiz is unlocked.':'Mastered '+studyCount()+' of '+auto().length+' recall questions. Also confirm every map/written prompt.';root.append(status);STUDY.questions.forEach(q=>{const c=document.createElement('section');c.className='card '+(q.type==='auto'&&mastered(q)?'mastered':state.reviews[q.num]?'reviewed':'');c.innerHTML='<div class="question">'+q.num+'. '+q.question+'</div>'+(q.page?'<div class="page">Page(s): '+q.page+'</div>':'');if(q.type==='auto'){if(mastered(q)){c.innerHTML+='<p class="correct"><strong>Mastered</strong></p>'}else{const input=document.createElement('input');input.type='text';input.value=state.answers[q.num]||'';input.setAttribute('aria-label','Answer for question '+q.num);input.oninput=()=>{state.answers[q.num]=input.value;save()};const submit=document.createElement('button');submit.textContent='Check answer';const f=document.createElement('div');const check=()=>{if(!input.value){f.className='feedback wrong';f.textContent='Enter an answer first.';return}const result=grade(q,input.value);stat('study',q.num)[result]++;save();feedback(f,result);if(result==='correct')setTimeout(renderStudy,450)};submit.onclick=check;input.onkeydown=e=>{if(e.key==='Enter')check()};c.append(input,submit,f)}}else{const note=document.createElement('p');note.textContent=q.type==='map'?'Map-identification item: review it on a map, then confirm.':'Written-response item: review your response independently, then confirm.';const review=document.createElement('button');review.className='secondary';review.textContent=state.reviews[q.num]?'Reviewed':'I reviewed this';review.onclick=()=>{state.reviews[q.num]=!state.reviews[q.num];save();renderStudy()};c.append(note,review)}root.append(c)})}
function renderQuiz(){controls();const root=document.getElementById('content');if(!unlocked()){root.innerHTML='<div class="lock">Quiz mode is locked until every study answer is exact and all self-review prompts are confirmed.</div>';return}if(!state.quiz.started){state.quiz={queue:shuffle(auto().map(q=>q.num)),current:null,started:true};save()}if(!state.quiz.current)state.quiz.current=state.quiz.queue.shift()||null;root.innerHTML='';const completed=auto().filter(q=>(stat('quiz',q.num).correct||0)>0).length;root.innerHTML='<div class="status">Quiz correct: '+completed+' of '+auto().length+'. Choose the correct answer before moving to the next question.</div>';if(!state.quiz.current){root.innerHTML+='<section class="card mastered"><h2>Quiz complete!</h2><p>Use Toughest questions to review what took the most attempts.</p></section>';return}const q=byNum(state.quiz.current),c=document.createElement('section');c.className='card';c.innerHTML='<div class="question">'+q.num+'. '+q.question+'</div>'+(q.page?'<div class="page">Page(s): '+q.page+'</div>':'');const f=document.createElement('div');shuffle(q.choices).forEach(choice=>{const b=document.createElement('button');b.className='choice';b.textContent=choice;b.onclick=()=>{const result=choice===q.answer?'correct':'wrong';stat('quiz',q.num)[result]++;feedback(f,result);if(result==='correct'){state.quiz.current=null;save();setTimeout(renderQuiz,500)}else{save()}};c.append(b)});c.append(f);root.append(c)}
function renderTough(){controls();const root=document.getElementById('content'),rows=auto().map(q=>{const a=stat('study',q.num),b=stat('quiz',q.num),study=a.wrong+a.format+a.spelling,quiz=b.wrong;return {q,study,quiz,total:study+quiz}}).filter(row=>row.total).sort((a,b)=>b.total-a.total);root.innerHTML='<section class="card"><h2>Toughest questions</h2>'+(!rows.length?'<p>No missed attempts yet.</p>':'<ol>'+rows.map(row=>'<li><strong>'+row.q.num+'.</strong> '+row.q.question+' <small>— '+row.total+' miss(es): study '+row.study+', quiz '+row.quiz+'</small></li>').join('')+'</ol>')+'</section>'}
function setMode(mode){if(mode==='quiz'&&!unlocked()){renderStudy();return}document.querySelectorAll('.modes button').forEach(b=>b.classList.remove('active'));document.getElementById(mode+'Mode').classList.add('active');if(mode==='study')renderStudy();else if(mode==='quiz')renderQuiz();else renderTough()}function skipStudy(){if(prompt('Enter the password to skip directly to quiz mode:')!==SKIP_PASSWORD){alert('Incorrect password.');return}auto().forEach(q=>{stat('study',q.num).correct=1});STUDY.questions.filter(q=>q.type!=='auto').forEach(q=>{state.reviews[q.num]=true});save();setMode('quiz')}document.getElementById('title').textContent=STUDY.title;document.getElementById('studyMode').onclick=()=>setMode('study');document.getElementById('quizMode').onclick=()=>setMode('quiz');document.getElementById('toughMode').onclick=()=>setMode('tough');document.getElementById('skipStudy').onclick=skipStudy;document.getElementById('export').onclick=()=>{const blob=new Blob([JSON.stringify({studyId:STUDY.id,version:VERSION,state},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=STUDY.id+'_progress.json';a.click();URL.revokeObjectURL(a.href)};document.getElementById('importButton').onclick=()=>document.getElementById('importFile').click();document.getElementById('importFile').onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const value=JSON.parse(reader.result);if(value.studyId!==STUDY.id||value.version!==VERSION||!value.state)throw Error();state={...fresh(),...value.state};save();setMode('study')}catch(error){alert('This progress file belongs to a different study or is invalid.')}};reader.readAsText(file)};document.getElementById('reset').onclick=()=>{if(confirm('Reset all saved answers and statistics?')){localStorage.removeItem(KEY);state=fresh();setMode('study')}};load();setMode('study');
</script></body></html>
