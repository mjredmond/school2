type":"auto","answer":"Kamala Harris","choices":["Amy Coney Barrett","Kamala Harris","Nancy Pelosi","Condoleezza Rice"]},{"num":"15","page":"481","question":"Which disaster affected much of the Gulf Coast?","type":"auto","answer":"BP Deepwater Horizon explosion","choices":["BP Deepwater Horizon explosion","Exxon Valdez oil spill","Great American Eclipse","wildfire"]},{"num":"16","page":"482","question":"Which hurricane became a superstorm that affected many parts of the East Coast in 2012?","type":"auto","answer":"Sandy","choices":["Ivan","Kilauea","Katrina","Sandy"]},{"num":"17","page":"486","question":"What did the Tesla motor company design?","type":"auto","answer":"self-driving car","choices":["rocket","self-driving car","smartphone","virtual assistant"]},{"num":"18","page":"486","question":"What telescope was designed to take clear pictures of objects in space from more than one million miles from Earth?","type":"auto","answer":"James Webb Space Telescope","choices":["Hubble Telescope","James Webb Space Telescope","Perseverance","Sputnik 1"]},{"num":"19","page":"329","question":"Who was the Allied commander in Europe during World War II?","type":"auto","answer":"Dwight D. Eisenhower","choices":["Dwight D. Eisenhower","John F. Kennedy","Ronald Reagan","Norman Schwarzkopf"]},{"num":"20","page":"356","question":"Who was president during the Cuban Missile Crisis?","type":"auto","answer":"John F. Kennedy","choices":["John F. Kennedy","Jimmy Carter","George W. Bush","Barack Obama"]},{"num":"21","page":"359","question":"Which president's plan was called the Great Society?","type":"auto","answer":"Lyndon B. Johnson","choices":["Lyndon B. Johnson","Jimmy Carter","Ronald Reagan","Donald Trump"]},{"num":"22","page":"370","question":"Which civil rights leader led the March on Washington?","type":"auto","answer":"Dr. Martin Luther King, Jr.","choices":["Dr. Martin Luther King, Jr.","James Dobson","Jerry Falwell","Colin Powell"]},{"num":"23","page":"393","question":"Which pr ,"Korea","Iraq","Afghanistan"]},{"num":"33","page":"427","question":"Operation Desert Storm was the first military action of which war?","type":"auto","answer":"Persian Gulf","choices":["Persian Gulf","Vietnam","Korean","Cold"]},{"num":"34","page":"452–453","question":"The One World Trade Center was built beside ground zero in what city?","type":"auto","answer":"New York City","choices":["New York City","Washington, D.C.","New Orleans","Boston"]},{"num":"35","page":"454","question":"Hurricane Katrina caused severe flooding in what city?","type":"auto","answer":"New Orleans","choices":["New Orleans","Houston","Miami","New York City"]},{"num":"36","page":"525","question":"Be able to identify Arizona on a map.","type":"map"},{"num":"37","page":"525","question":"Be able to identify Arkansas on a map.","type":"map"},{"num":"38","page":"525","question":"Be able to identify Idaho on a map.","type":"map"},{"num":"39","page":"525","question":"Be able to identify Kansas on a map.","type":"map"},{"num":"40","page":"525","question":"Be able to identify Montana on a map.","type":"map"},{"num":"41","page":"525","question":"Be able to identify Nevada on a map.","type":"map"},{"num":"42","page":"525","question":"Be able to identify Pennsylvania on a map.","type":"map"},{"num":"43","page":"525","question":"Be able to identify Tennessee on a map.","type":"map"},{"num":"44","page":"525","question":"Be able to identify Utah on a map.","type":"map"},{"num":"45","page":"525","question":"Be able to identify Wisconsin on a map.","type":"map"},{"num":"46","page":"550–551","question":"What is the capital of Colorado?","type":"auto","answer":"Denver","choices":["Boise","Carson City","Denver","Honolulu"]},{"num":"47","page":"550–551","question":"What is the capital of Hawaii?","type":"auto","answer":"Honolulu","choices":["Boise","Carson City","Denver","Honolulu"]},{"num":"48","page":"550–551","question":"What is the capital of Idaho?","type":"auto","answer":"Boise","choices":["Boise","Carson City","Denver","Honolulu"]},{"num":"49","page":"550–551","question":"What is the capital of Nevada?","type":"auto","answer":"Carson City","choices":["Boise","Carson City","Denver","Honolulu"]},{"num":"50","page":"550–551","question":"What is the capital of Oregon?","type":"auto","answer":"Salem","choices":["Boise","Carson City","Denver","Salem"]},{"num":"51","page":"537","question":"Be able to identify American Samoa on a map.","type":"map"},{"num":"52","page":"537","question":"Be able to identify Guam on a map.","type":"map"},{"num":"53","page":"537","question":"Be able to identify Puerto Rico on a map.","type":"map"},{"num":"54","page":"537","question":"Be able to identify Northern Mariana Islands on a map.","type":"map"},{"num":"55","page":"537","question":"Be able to identify U.S. Virgin Islands on a map.","type":"map"}]}</script><script>
const STUDY=JSON.parse(document.getElementById('study-data').textContent),VERSION='bf0c1c6bc52b',KEY='abeka-practice:'+STUDY.id+':'+VERSION,SKIP_PASSWORD='abc123';
const fresh=()=>({answers:{},reviews:{},stats:{study:{},quiz:{}},quiz:{queue:[],current:null,started:false}});let state=fresh();
function load(){try{const value=JSON.parse(localStorage.getItem(KEY));if(value&&value.stats&&value.stats.study&&value.stats.quiz)state={...fresh(),...value,stats:{...fresh().stats,...value.stats}}}catch(e){}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function byNum(n){return STUDY.questions.find(q=>q.num===String(n))}function auto(){return STUDY.questions.filter(q=>q.type==='auto')}function stat(mode,n){const group=state.stats[mode],s=group[n]||(group[n]={correct:0,wrong:0,format:0,spelling:0});return s}function mastered(q){return (stat('study',q.num).correct||0)>0}function unlocked(){return STUDY.questions.every(q=>q.type==='auto'?mastered(q):state.reviews[q.num])}
function norm(s){return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^\p{L}\p{N}]/gu,'')}function distance(a,b){const d=Array.from({length:a.length+1},(_,i)=>[i]);for(let j=1;j<=b.length;j++)d[0][j]=j;for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[a.length][b.length]}function grade(q,value){if(value===q.answer)return 'correct';const a=norm(value),b=norm(q.answer);if(a===b)return 'format';const threshold=b.length<=4?1:b.length<=10?2:Math.min(4,Math.floor(b.length*.2));return a&&distance(a,b)<=threshold?'spelling':'wrong'}function text(result){return {correct:'Correct — mastered!',format:'Formatting error — check capitalization, punctuation, spacing, or accents.',spelling:'Spelling error — check the spelling carefully.',wrong:'Not correct. Try again.'}[result]}function shuffle(items){const copy=[...items];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function feedback(el,result){el.className='feedback '+result;el.textContent=text(result)}function controls(){const ready=unlocked(),button=document.getElementById('quizMode');button.disabled=!ready;button.title=ready?'':'Master every study item first.'}function studyCount(){return auto().filter(mastered).length}
function renderStudy(){controls();const root=document.getElementById('content');root.innerHTML='';const status=document.createElement('div');status.className=unlocked()?'status mastered':'status lock';status.textContent=unlocked()?'Study phase complete. Multiple-choice quiz is unlocked.':'Mastered '+studyCount()+' of '+auto().length+' recall questions. Also confirm every map/written prompt.';root.append(status);STUDY.questions.forEach(q=>{const c=document.createElement('section');c.className='card '+(q.type==='auto'&&mastered(q)?'mastered':state.reviews[q.num]?'reviewed':'');c.innerHTML='<div class="question">'+q.num+'. '+q.question+'</div>'+(q.page?'<div class="page">Page(s): '+q.page+'</div>':'');if(q.type==='auto'){if(mastered(q)){c.innerHTML+='<p class="correct"><strong>Mastered</strong></p>'}else{const input=document.createElement('input');input.type='text';input.value=state.answers[q.num]||'';input.setAttribute('aria-label','Answer for question '+q.num);input.oninput=()=>{state.answers[q.num]=input.value;save()};const submit=document.createElement('button');submit.textContent='Check answer';const f=document.createElement('div');const check=()=>{if(!input.value){f.className='feedback wrong';f.textContent='Enter an answer first.';return}const result=grade(q,input.value);stat('study',q.num)[result]++;save();feedback(f,result);if(result==='correct')setTimeout(renderStudy,450)};submit.onclick=check;input.onkeydown=e=>{if(e.key==='Enter')check()};c.append(input,submit,f)}}else{const note=document.createElement('p');note.textContent=q.type==='map'?'Map-identification item: review it on a map, then confirm.':'Written-response item: review your response independently, then confirm.';const review=document.createElement('button');review.className='secondary';review.textContent=state.reviews[q.num]?'Reviewed':'I reviewed this';review.onclick=()=>{state.reviews[q.num]=!state.reviews[q.num];save();renderStudy()};c.append(note,review)}root.append(c)})}
function renderQuiz(){controls();const root=document.getElementById('content');if(!unlocked()){root.innerHTML='<div class="lock">Quiz mode is locked until every study answer is exact and all self-review prompts are confirmed.</div>';return}if(!state.quiz.started){state.quiz={queue:shuffle(auto().map(q=>q.num)),current:null,started:true};save()}if(!state.quiz.current)state.quiz.current=state.quiz.queue.shift()||null;root.innerHTML='';const completed=auto().filter(q=>(stat('quiz',q.num).correct||0)>0).length;root.innerHTML='<div class="status">Quiz correct: '+completed+' of '+auto().length+'. Choose the correct answer before moving to the next question.</div>';if(!state.quiz.current){const done=document.createElement('section');done.className='card mastered';done.innerHTML='<h2>Quiz complete!</h2><p>Use Toughest questions to review what took the most attempts.</p>';const restart=document.createElement('button');restart.textContent='Start another quiz';restart.onclick=()=>{state.quiz={queue:shuffle(auto().map(q=>q.num)),current:null,started:true};save();renderQuiz()};done.append(restart);root.append(done);return}const q=byNum(state.quiz.current),c=document.createElement('section');c.className='card';c.innerHTML='<div class="question">'+q.num+'. '+q.question+'</div>'+(q.page?'<div class="page">Page(s): '+q.page+'</div>':'');const f=document.createElement('div');shuffle(q.choices).forEach(choice=>{const b=document.createElement('button');b.className='choice';b.textContent=choice;b.onclick=()=>{const result=choice===q.answer?'correct':'wrong';stat('quiz',q.num)[result]++;feedback(f,result);if(result==='correct'){state.quiz.current=null;save();setTimeout(renderQuiz,500)}else{save()}};c.append(b)});c.append(f);root.append(c)}
function renderTough(){controls();const root=document.getElementById('content'),rows=auto().map(q=>{const a=stat('study',q.num),b=stat('quiz',q.num),study=a.wrong+a.format+a.spelling,quiz=b.wrong;return {q,study,quiz,total:study+quiz}}).filter(row=>row.total).sort((a,b)=>b.total-a.total);root.innerHTML='<section class="card"><h2>Toughest questions</h2>'+(!rows.length?'<p>No missed attempts yet.</p>':'<ol>'+rows.map(row=>'<li><strong>'+row.q.num+'.</strong> '+row.q.question+' <small>— '+row.total+' miss(es): study '+row.study+', quiz '+row.quiz+'</small></li>').join('')+'</ol>')+'</section>'}
function setMode(mode){if(mode==='quiz'&&!unlocked()){renderStudy();return}document.querySelectorAll('.modes button').forEach(b=>b.classList.remove('active'));document.getElementById(mode+'Mode').classList.add('active');if(mode==='study')renderStudy();else if(mode==='quiz')renderQuiz();else renderTough()}function skipStudy(){if(prompt('Enter the password to skip directly to quiz mode:')!==SKIP_PASSWORD){alert('Incorrect password.');return}auto().forEach(q=>{stat('study',q.num).correct=1});STUDY.questions.filter(q=>q.type!=='auto').forEach(q=>{state.reviews[q.num]=true});save();setMode('quiz')}document.getElementById('title').textContent=STUDY.title;document.getElementById('studyMode').onclick=()=>setMode('study');document.getElementById('quizMode').onclick=()=>setMode('quiz');document.getElementById('toughMode').onclick=()=>setMode('tough');document.getElementById('skipStudy').onclick=skipStudy;document.getElementById('export').onclick=()=>{const blob=new Blob([JSON.stringify({studyId:STUDY.id,version:VERSION,state},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=STUDY.id+'_progress.json';a.click();URL.revokeObjectURL(a.href)};document.getElementById('importButton').onclick=()=>document.getElementById('importFile').click();document.getElementById('importFile').onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const value=JSON.parse(reader.result);if(value.studyId!==STUDY.id||value.version!==VERSION||!value.state)throw Error();state={...fresh(),...value.state};save();setMode('study')}catch(error){alert('This progress file belongs to a different study or is invalid.')}};reader.readAsText(file)};document.getElementById('reset').onclick=()=>{if(confirm('Reset all saved answers and statistics?')){localStorage.removeItem(KEY);state=fresh();setMode('study')}};load();setMode('study');
</script></body></html>
