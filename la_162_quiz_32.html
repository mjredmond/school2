const app=document.getElementById('app');

const state={variant:{},answers:{},checkedAll:false,checkedItems:{},showAnswers:false,wrongAttempts:{},revealedAnswers:{}};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const arrEq=(a,b)=>JSON.stringify(a||[])===JSON.stringify(b||[]);

function allItems(){return (PRACTICE.sections||[]).flatMap(section=>(section.items||[]).map(item=>({section,item})));}
function findItem(id){return allItems().find(x=>x.item.id===id)?.item;}
function activeVariant(item){return (item.variants||[])[state.variant[item.id]]||{};}
function defaultAnswer(type){
  if(type==='choice')return{choice:null,choices:{}};
  if(type==='proofread')return{mode:'punct',side:'after',mark:',',caps:[],punct:[]};
  if(type==='short-answer')return{text:'',texts:{}};
  if(type==='edit-text')return{text:''};
  if(type==='word-mark')return{targets:[]};
  if(type==='comma')return{mode:'after',boundaries:[],boundarySides:{}};
  if(['phrase','pattern','advprep'].includes(type))return{mode:'phrase',phraseStart:null,phrases:[],objects:[],subjects:[],verbs:[],verb:'',pattern:'',advprep:'',label:''};
  if(type==='diagram')return{pattern:'',basicShape:'',shape:'',selectedRole:'S',selectedWord:null,selectedTarget:'',roles:{},assignments:{},understood:{}};
  return{};
}
function ensure(id){const item=findItem(id);if(!state.answers[id])state.answers[id]=defaultAnswer(item?.type);return state.answers[id];}
function newRun(){state.variant={};state.answers={};state.checkedAll=false;state.checkedItems={};state.showAnswers=false;state.wrongAttempts={};state.revealedAnswers={};for(const {item} of allItems()){state.variant[item.id]=Math.floor(Math.random()*Math.max(1,(item.variants||[]).length));state.answers[item.id]=defaultAnswer(item.type);}render();}
function isItemChecked(item){return !!state.checkedAll||!!state.checkedItems[item.id];}
function answerUnlocked(id){return (state.wrongAttempts[id]||0)>=5||!!state.revealedAnswers[id];}
function shouldShowAnswer(id){return !!state.revealedAnswers[id]||(state.showAnswers&&answerUnlocked(id));}
function recordCheck(item){const ok=isCorrect(item,activeVariant(item),ensure(item.id));if(ok){state.wrongAttempts[item.id]=0;}else{state.wrongAttempts[item.id]=(state.wrongAttempts[item.id]||0)+1;}return ok;}
function renderPrompt(item,v,a){
  const prompt=v.prompt||item.prompt||'';
  if(item.type==='diagram')return esc(v.sentence||((v.tokens||[]).filter(token=>!String(token).startsWith('(')).join(' ')));
  if(item.type==='choice'&&Array.isArray(v.items)&&String(prompt).includes('___'))return renderSentencePreview(prompt,v,a);
  return esc(prompt);
}
function selectedSubChoice(v,a,matcher){
  const items=v.items||[];
  const index=items.findIndex(matcher);
  if(index<0)return null;
  const picked=a.choices?.[index];
  if(picked===undefined||picked===null||picked==='')return null;
  const sub=items[index];
  return {index,picked:Number(picked),label:String((sub.choices||[])[Number(picked)]??''),sub};
}
function isPunctuationChoice(sub){const p=String(sub.prompt||'').toLowerCase();return p.includes('punctuation')||p.includes('mark');}
function isCapitalizationChoice(sub){return String(sub.prompt||'').toLowerCase().includes('capital');}
function shouldCapitalize(label){return /capital/i.test(label)&&!/already|correct|unchanged|no change/i.test(label);}
function renderSentencePreview(prompt,v,a){
  const text=String(prompt||'');
  const slot=text.indexOf('___');
  if(slot<0)return esc(text);
  const before=text.slice(0,slot).replace(/\s+$/,'');
  const after=text.slice(slot+3).replace(/^\s+/,'');
  const punct=selectedSubChoice(v,a,isPunctuationChoice);
  const cap=selectedSubChoice(v,a,isCapitalizationChoice);
  const mark=punct?`<span class="choice-fill">${esc(punct.label)}</span>`:'<span class="blank-slot"></span>';
  const tail=renderCapitalizationTail(after,cap);
  return `<span class="sentence-live">${esc(before)}${mark}${tail?` ${tail}`:''}</span>`;
}
function renderCapitalizationTail(text,cap){
  const raw=String(text||'');
  if(!cap)return esc(raw);
  const match=raw.match(/[A-Za-z][A-Za-z']*/);
  if(!match)return esc(raw);
  const start=match.index||0;
  const word=match[0];
  const makeCap=shouldCapitalize(cap.label);
  const shown=makeCap?word.charAt(0).toUpperCase()+word.slice(1):word;
  const cls=makeCap?'cap-change':'cap-keep';
  return esc(raw.slice(0,start))+`<span class="${cls}">${esc(shown)}</span>`+esc(raw.slice(start+word.length));
}
function render(){
  document.getElementById('subtitle').textContent=PRACTICE.subtitle||'';
  app.innerHTML=(PRACTICE.sections||[]).map(section=>`<section class="section"><h2>${esc(section.title)}</h2>${section.directions?`<p class="directions">${esc(section.directions)}</p>`:''}${(section.items||[]).map(renderItem).join('')}</section>`).join('');
  const items=allItems();
  const checked=items.filter(({item})=>isItemChecked(item));
  if(checked.length){const good=checked.filter(({item})=>isCorrect(item,activeVariant(item),state.answers[item.id])).length;const unchecked=items.length-checked.length;score.innerHTML=`<div class="section"><strong>${state.checkedAll?'Score':'Checked'}:</strong> ${good} correct of ${checked.length} checked${unchecked?` (${unchecked} unchecked)`:''}</div>`;}else{score.innerHTML='';}
}
function renderItem(item){
  const v=activeVariant(item);
  const a=ensure(item.id);
  const ok=isCorrect(item,v,a);
  const checked=isItemChecked(item);
  const cls=checked?(ok?' correct':' missed'):'';
  const wrongCount=state.wrongAttempts[item.id]||0;
  const canReveal=answerUnlocked(item.id);
  const showItemAnswer=shouldShowAnswer(item.id);
  const feedback=checked?'<span class="feedback">'+(ok?'Correct':'Try again')+'</span>':'';
  const attempts=checked&&!ok&&wrongCount>0?'<span class="pill">Wrong tries: '+Math.min(wrongCount,5)+'/5</span>':'';
  const reveal=!showItemAnswer&&canReveal?'<button data-action="reveal-answer" data-id="'+esc(item.id)+'">Show Answer</button>':'';
  return '<article class="item'+cls+'" id="'+esc(item.id)+'"><div class="stem"><div class="num">'+esc(item.num)+'.</div><div class="prompt">'+renderPrompt(item,v,a)+'</div></div>'+renderByType(item,v,a)+'<div class="item-tools"><button data-action="check-item" data-id="'+esc(item.id)+'">'+(checked?'Check Again':'Check')+'</button>'+feedback+attempts+reveal+'</div>'+(showItemAnswer?renderAnswer(item,v):'')+'</article>';
}
function renderByType(item,v,a){
  if(item.type==='choice')return renderChoice(item,v,a);
  if(item.type==='proofread')return renderProofread(item,v,a);
  if(item.type==='short-answer')return renderShort(item,v,a);
  if(item.type==='edit-text')return `<textarea data-input="edit" data-id="${esc(item.id)}">${esc(a.text||'')}</textarea>`;
  if(item.type==='word-mark')return renderWordMark(item,v,a);
  if(item.type==='comma')return renderComma(item,v,a);
  if(['phrase','pattern','advprep'].includes(item.type))return renderPhrase(item,v,a);
  if(item.type==='diagram')return renderDiagram(item,v,a);
  return `<p class="directions">Unsupported item type: ${esc(item.type)}</p>`;
}
function renderChoice(item,v,a){
  if(Array.isArray(v.items))return v.items.map((sub,i)=>`<div class="subrow"><label>${esc(sub.prompt||String.fromCharCode(97+i)+'.')}</label><div class="options">${(sub.choices||[]).map((c,j)=>`<button data-action="choice-sub" data-id="${esc(item.id)}" data-index="${i}" data-value="${j}" class="${Number(a.choices?.[i])===j?'selected':''}">${esc(c)}</button>`).join('')}</div></div>`).join('');
  return `<div class="options">${(v.choices||[]).map((c,i)=>`<button data-action="choice" data-id="${esc(item.id)}" data-value="${i}" class="${a.choice===i?'selected':''}">${esc(c)}</button>`).join('')}</div>`;
}function renderShort(item,v,a){
  if(Array.isArray(v.items))return v.items.map((sub,i)=>`<div class="subrow"><label>${esc(sub.prompt||String.fromCharCode(97+i)+'.')}</label><input data-input="short" data-id="${esc(item.id)}" data-index="${i}" value="${esc(a.texts?.[i]||'')}"></div>`).join('');
  return `<input data-input="short" data-id="${esc(item.id)}" value="${esc(a.text||'')}">`;
}
function renderTokens(tokens,buttonHtml){return `<div class="token-line">${(tokens||[]).map(buttonHtml).join('')}</div>`;}
function renderWordMark(item,v,a){return renderTokens(v.tokens,(t,i)=>`<button class="token ${a.targets.includes(i)?'marked':''}" data-action="toggle-token" data-id="${esc(item.id)}" data-index="${i}">${esc(t)}</button>`);}
function renderComma(item,v,a){
  const modes=`<div class="modes"><button class="${a.mode==='before'?'active':''}" data-action="comma-mode" data-id="${esc(item.id)}" data-value="before">Add Before</button><button class="${a.mode==='after'?'active':''}" data-action="comma-mode" data-id="${esc(item.id)}" data-value="after">Add After</button><button data-action="clear-commas" data-id="${esc(item.id)}">Clear</button></div>`;
  const tokens=renderTokens(v.tokens,(t,i)=>{const before=a.boundaries.includes(i)&&(a.boundarySides?.[i]==='before'||i===0);const after=a.boundaries.includes(i+1)&&(a.boundarySides?.[i+1]==='after'||i+1===(v.tokens||[]).length);return `<button class="token ${before?'comma-before':''} ${after?'comma-after':''}" data-action="comma-token" data-id="${esc(item.id)}" data-index="${i}">${esc(t)}</button>`});
  return modes+tokens;
}
function renderProofread(item,v,a){
  const marks=v.markOptions||[',','.','!','?','"'];
  const modes=`<div class="modes"><button class="${a.mode==='punct'?'active':''}" data-action="proof-mode" data-id="${esc(item.id)}" data-value="punct">Punctuation</button><button class="${a.mode==='cap'?'active':''}" data-action="proof-mode" data-id="${esc(item.id)}" data-value="cap">Capitalization</button><button class="${a.side==='before'?'active':''}" data-action="proof-side" data-id="${esc(item.id)}" data-value="before">Add Before</button><button class="${a.side==='after'?'active':''}" data-action="proof-side" data-id="${esc(item.id)}" data-value="after">Add After</button><button data-action="clear-proofread" data-id="${esc(item.id)}">Clear</button></div>`;
  const markBtns=`<div class="modes"><span class="pill">Mark</span>${marks.map(m=>`<button class="${a.mark===m?'active':''}" data-action="proof-mark" data-id="${esc(item.id)}" data-value="${esc(m)}">${esc(m)}</button>`).join('')}</div>`;
  const tokens=renderTokens(v.tokens,(t,i)=>{
    const before=(a.punct||[]).filter(p=>Number(p.boundary)===i&&(p.side==='before'||i===0)).map(p=>`<span class="proof-mark">${esc(p.mark)}</span>`).join('');
    const after=(a.punct||[]).filter(p=>Number(p.boundary)===i+1&&(p.side==='after'||i+1===(v.tokens||[]).length)).map(p=>`<span class="proof-mark">${esc(p.mark)}</span>`).join('');
    const capped=(a.caps||[]).includes(i);
    const shown=capped?capitalizeToken(t):t;
    return `<button class="token ${capped?'proof-cap':''}" data-action="proof-token" data-id="${esc(item.id)}" data-index="${i}">${before}${esc(shown)}${after}</button>`;
  });
  return modes+markBtns+tokens;
}
function capitalizeToken(text){return String(text||'').replace(/[A-Za-z]/,m=>m.toUpperCase());}
function togglePunct(a,boundary,mark,side){
  if(!a.punct)a.punct=[];
  const i=a.punct.findIndex(p=>Number(p.boundary)===Number(boundary)&&String(p.mark)===String(mark));
  if(i>=0){
    if(a.punct[i].side===side)a.punct.splice(i,1);
    else a.punct[i].side=side;
  }else a.punct.push({boundary:Number(boundary),mark:String(mark),side:String(side||'after')});
}
function phraseTokenClasses(v,a,i,kind){
  const all=kind==='all';
  const inPhrase=(a.phrases||[]).some(r=>i>=r.start&&i<=r.end);
  const isObject=(a.objects||[]).includes(i);
  const isSubject=(a.subjects||[]).includes(i);
  const isVerb=(a.verbs||[]).includes(i);
  const isStart=(kind==='phrase'||all&&a.mode==='phrase')&&a.phraseStart===i;
  const isBold=(v.boldIndices||[]).includes(i);
  return `token ${(all||kind==='phrase')&&inPhrase?'marked':''} ${(all||kind==='object')&&isObject?'object':''} ${(all||kind==='subject')&&isSubject?'subject':''} ${(all||kind==='verb')&&isVerb?'verb':''} ${isStart?'start':''} ${isBold?'bold-word':''}`;
}
function renderPhraseTokenLine(item,v,a,kind,action){
  return renderTokens(v.tokens,(t,i)=>{
    if(t==='__VERB__')return `<span class="verb-slot">(${esc((v.verbChoices||[]).join(', '))})</span>`;
    return `<button class="${phraseTokenClasses(v,a,i,kind)}" data-action="${esc(action)}" data-id="${esc(item.id)}" data-index="${i}">${esc(t)}</button>`;
  });
}
function renderActionRow(item,title,content,clearAction){
  const clear=clearAction?`<button data-action="${esc(clearAction)}" data-id="${esc(item.id)}">Clear</button>`:'';
  return `<div class="action-row"><div class="action-title"><span class="pill">${esc(title)}</span>${clear}</div>${content}</div>`;
}
function renderSeparatedPhrase(item,v,a,pattern,advprep,labelChoices,verbChoices){
  const buttons=[];
  if(Array.isArray(v.phrases))buttons.push(['phrase','Prepositional Phrase']);
  if(Array.isArray(v.objects))buttons.push(['object','Object of Preposition']);
  if(Array.isArray(v.subjectTargets))buttons.push(['subject','Subject']);
  if(Array.isArray(v.verbTargets))buttons.push(['verb','Verb']);
  const modeButtons=buttons.map(([mode,label])=>`<button class="${a.mode===mode?'active':''}" data-action="phrase-mode" data-id="${esc(item.id)}" data-value="${esc(mode)}">${esc(label)}</button>`).join('');
  const clearButtons=`<button data-action="clear-phrases" data-id="${esc(item.id)}">Clear Phrases</button>${Array.isArray(v.objects)?`<button data-action="clear-objects" data-id="${esc(item.id)}">Clear Objects</button>`:''}${Array.isArray(v.subjectTargets)?`<button data-action="clear-subjects" data-id="${esc(item.id)}">Clear Subjects</button>`:''}${Array.isArray(v.verbTargets)?`<button data-action="clear-verbs" data-id="${esc(item.id)}">Clear Verbs</button>`:''}`;
  const modes=`<div class="modes"><span class="pill">Mark</span>${modeButtons}${clearButtons}</div>`;
  const tokens=renderPhraseTokenLine(item,v,a,'all','phrase-token');
  const chips=`<div class="chips">${(a.phrases||[]).map((r,i)=>`<span class="pill">phrase ${r.start+1}-${r.end+1}<button data-action="remove-phrase" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}${(a.objects||[]).map(i=>`<span class="pill">object ${i+1}<button data-action="remove-object" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}${(a.subjects||[]).map(i=>`<span class="pill">subject ${i+1}<button data-action="remove-subject" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}${(a.verbs||[]).map(i=>`<span class="pill">verb ${i+1}<button data-action="remove-verb" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}</div>`;
  const extras=[pattern,advprep,verbChoices,labelChoices].filter(Boolean).join('');
  return modes+tokens+extras+chips;
}
function renderPhrase(item,v,a){
  const pattern=item.type==='pattern'?`<div class="modes"><span class="pill">Pattern</span>${(v.patternOptions||['S AV','S AV DO','S LV PA','S LV PN','S AV IO DO']).map(p=>`<button class="${a.pattern===p?'active':''}" data-action="set-pattern" data-id="${esc(item.id)}" data-value="${esc(p)}">${esc(p)}</button>`).join('')}</div>`:'';
  const advprep=item.type==='advprep'?`<div class="modes"><span class="pill">Answer</span>${['Adv.','Prep.'].map(p=>`<button class="${a.advprep===p?'active':''}" data-action="set-advprep" data-id="${esc(item.id)}" data-value="${esc(p)}">${esc(p)}</button>`).join('')}</div>`:'';
  const labelChoices=Array.isArray(v.labelOptions)?`<div class="modes"><span class="pill">Noun label</span>${v.labelOptions.map(p=>`<button class="${a.label===p?'active':''}" data-action="set-label" data-id="${esc(item.id)}" data-value="${esc(p)}">${esc(p)}</button>`).join('')}</div>`:'';
  const subjectBtn=Array.isArray(v.subjectTargets)?`<button class="${a.mode==='subject'?'active':''}" data-action="phrase-mode" data-id="${esc(item.id)}" data-value="subject">Mark Subject</button>`:'';
  const objectBtn=Array.isArray(v.objects)?`<button class="${a.mode==='object'?'active':''}" data-action="phrase-mode" data-id="${esc(item.id)}" data-value="object">Object of Preposition</button>`:'';
  const clearObjects=Array.isArray(v.objects)?`<button data-action="clear-objects" data-id="${esc(item.id)}">Clear Objects</button>`:'';
  const verbChoices=Array.isArray(v.verbChoices)?`<div class="modes"><span class="pill">Correct verb</span>${v.verbChoices.map(p=>`<button class="verb-choice ${a.verb===p?'active':''}" data-action="set-verb-choice" data-id="${esc(item.id)}" data-value="${esc(p)}">${esc(p)}</button>`).join('')}</div>`:'';
  if(v.separateActions)return renderSeparatedPhrase(item,v,a,pattern,advprep,labelChoices,verbChoices);
  const modes=`<div class="modes"><button class="${a.mode==='phrase'?'active':''}" data-action="phrase-mode" data-id="${esc(item.id)}" data-value="phrase">Prepositional Phrase</button>${subjectBtn}${objectBtn}<button data-action="clear-phrases" data-id="${esc(item.id)}">Clear Phrases</button>${clearObjects}<button data-action="clear-subjects" data-id="${esc(item.id)}">Clear Subjects</button></div>`;
  const tokens=renderTokens(v.tokens,(t,i)=>{
    if(t==='__VERB__')return `<span class="verb-slot">(${esc((v.verbChoices||[]).join(', '))})</span>`;
    const inPhrase=a.phrases.some(r=>i>=r.start&&i<=r.end);
    const isObject=a.objects.includes(i);
    const isSubject=(a.subjects||[]).includes(i);
    const isStart=a.phraseStart===i;
    const isBold=(v.boldIndices||[]).includes(i);
    return `<button class="token ${inPhrase?'marked':''} ${isObject?'object':''} ${isSubject?'subject':''} ${isStart?'start':''} ${isBold?'bold-word':''}" data-action="phrase-token" data-id="${esc(item.id)}" data-index="${i}">${esc(t)}</button>`
  });
  const chips=`<div class="chips">${a.phrases.map((r,i)=>`<span class="pill">phrase ${r.start+1}-${r.end+1}<button data-action="remove-phrase" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}${(a.subjects||[]).map(i=>`<span class="pill">subject ${i+1}<button data-action="remove-subject" data-id="${esc(item.id)}" data-index="${i}">x</button></span>`).join('')}</div>`;
  return pattern+advprep+labelChoices+modes+tokens+verbChoices+chips;
}const DIAGRAM_ROLES=[
  {id:'S',label:'Subject',className:'role-s'},
  {id:'AV',label:'Action Verb',className:'role-av'},
  {id:'LV',label:'Linking Verb',className:'role-lv'},

  {id:'PA',label:'Pred. Adj.',className:'role-pa'},

const DIAGRAM_ROLE_MAP=Object.fromEntries(DIAGRAM_ROLES.map(role=>[role.id,role]));

  verbA:'Action verb',verbConj:'and',verbB:'Action verb',

function diagramBasicForShape(shape){
  shape=String(shape||'');
  if(shape==='simple'||shape.startsWith('simple-'))return 'simple';
  if(shape==='av-do'||shape.startsWith('av-do-'))return 'av-do';
  if(shape.startsWith('csdo-'))return 'compound-subject-do';
  if(shape.startsWith('cv-'))return 'compound-verb';
  if(shape.startsWith('lv-'))return 'linking-complement';
  return '';
}
function diagramLabel(value,labels){return labels?.[value]||String(value||'');}
function diagramRoleOptions(v){
  const ids=v.roleOptions||DIAGRAM_ROLES.map(role=>role.id);
  return ids.map(id=>DIAGRAM_ROLE_MAP[id]||{id,label:String(id),className:'role-omit'});
}
function diagramSlotLabel(value,v){
  if(v.slotLabels&&v.slotLabels[value])return v.slotLabels[value];
  if(DIAGRAM_SLOT_LABELS[value])return DIAGRAM_SLOT_LABELS[value];
  return String(value||'').replace(/([a-z])([A-Z])/g,'$1 $2').replace(/\b\w/g,m=>m.toUpperCase());
}
function diagramHiddenIndices(v){return new Set((v.hiddenIndices||[]).map(Number));}
function isHiddenDiagramIndex(v,index){return diagramHiddenIndices(v).has(Number(index));}
function visibleDiagramEntries(v){return (v.tokens||[]).map((token,index)=>({token,index})).filter(entry=>!isHiddenDiagramIndex(v,entry.index));}
function diagramUnderstoodWords(v){return (v.understoodWords||[]).map((word,index)=>({key:String(word.key||word.id||index),index:Number(word.index),prompt:word.prompt||'Understood word',answer:word.answer||word.label||''})).filter(word=>Number.isFinite(word.index));}
function diagramUnderstoodForIndex(v,index){return diagramUnderstoodWords(v).find(word=>Number(word.index)===Number(index));}
function diagramTokenLabel(v,a,index){const word=diagramUnderstoodForIndex(v,index);if(word)return a.understood?.[word.key]||'';return (v.tokens||[])[index]||'';}
function diagramSelectedWordLabel(v,a){if(a.selectedWord===undefined||a.selectedWord===null)return 'none';return diagramTokenLabel(v,a,Number(a.selectedWord))||'understood word';}
function diagramUnderstoodOk(v,a){return diagramUnderstoodWords(v).every(word=>textAnswer(a.understood?.[word.key],word.answer));}
function diagramSlots(v){
  if(Array.isArray(v.slots))return v.slots.map(slot=>({id:String(slot.id),label:slot.label||diagramSlotLabel(slot.id,v),expected:(slot.expected||[]).map(Number)}));
  return Object.entries(v.slots||{}).map(([id,expected])=>({id:String(id),label:diagramSlotLabel(id,v),expected:(expected||[]).map(Number)}));
}
function diagramHasSlot(v,slotId){return diagramSlots(v).some(slot=>slot.id===slotId);}
function diagramExpectedRoles(v){

  return `<svg class="diagram-svg" viewBox="0 0 760 390" role="img" aria-label="Sentence diagram canvas"><line class="diagram-line" x1="86" y1="170" x2="684" y2="170"></line><line class="diagram-line" x1="330" y1="124" x2="330" y2="216"></line><line class="diagram-line" x1="510" y1="124" x2="540" y2="170"></line>${targetBox(v,a,subjectSlot,146,136,142,34)}${targetBox(v,a,verbSlot,372,136,122,34)}${targetBox(v,a,firstExistingSlot(v,['complement','complementA']),558,136,132,34)}${modLines.join('')}</svg>`;
}
function renderDiagramSvg(v,a){
  a._itemId=a._itemId||'';
  const shape=a.shape;
  if(!shape)return emptyDiagramSvg(a.basicShape?'Choose a detailed diagram version.':'Choose a basic diagram structure.');
  if(shape==='simple'||shape.startsWith('simple-'))return simpleSvg(v,a,shape);
  if(shape==='av-do'||shape.startsWith('av-do-'))return avDoSvg(v,a,shape);
  if(shape.startsWith('cv-'))return compoundVerbSvg(v,a,shape);
  if(shape.startsWith('csdo-'))return compoundSubjectDoSvg(v,a,shape);
  if(shape.startsWith('lv-'))return linkingComplementSvg(v,a,shape);
  return simpleSvg(v,a,shape);
}
function diagramAnswerHtml(item,v){
  const correct=defaultAnswer('diagram');
  correct._itemId=item.id;
  correct.basicShape=v.basicShape||diagramBasicForShape(v.shape);
  correct.shape=v.shape||'';
  correct.pattern=v.pattern||'';
  correct.roles=diagramExpectedRoles(v);
  correct.assignments={};
  correct.understood={};
  for(const word of diagramUnderstoodWords(v))correct.understood[word.key]=word.answer;
  for(const slot of diagramSlots(v))correct.assignments[slot.id]=[...slot.expected];
  const roleLines=diagramRoleOptions(v).map(role=>{const ids=diagramExpectedRoles(v)[role.id]||[];return ids.length?`${role.id}: ${ids.map(index=>(v.tokens||[])[index]).join(', ')}`:'';}).filter(Boolean).join('; ');
  const omitted=diagramOmitted(v);
  return `<strong>Pattern:</strong> ${esc(v.pattern||'')}<br>${omitted.length?`<strong>Omit:</strong> ${esc(omitted.join('; '))}<br>`:''}<strong>Roles:</strong> ${esc(roleLines)}<div class="diagram-wrap">${renderDiagramSvg(v,correct)}</div>`;
}
function renderAnswer(item,v){
  let text='';
  if(item.type==='choice')text=Array.isArray(v.items)?v.items.map(sub=>`${sub.prompt||'Answer'}: ${(sub.choices||[])[sub.answer]||''}`).join('; '):((v.choices||[])[v.answer]||'');
  else if(item.type==='proofread')text=v.answer||'';
  else if(item.type==='short-answer')text=Array.isArray(v.items)?v.items.map(x=>x.answer).join('; '):v.answer;
  else if(item.type==='edit-text')text=v.answer;
  else if(item.type==='word-mark')text=(v.targets||[]).map(i=>(v.tokens||[])[i]).join(', ');
  else if(item.type==='comma')text=`Comma boundaries: ${(v.commaBoundaries||[]).join(', ')}`;
  else if(['phrase','pattern','advprep'].includes(item.type))text=[v.pattern,v.answer,v.correctVerb?`verb ${v.correctVerb}`:'',Array.isArray(v.subjectTargets)?`subject ${(v.subjectTargets||[]).map(i=>i+1).join(', ')}`:'',Array.isArray(v.verbTargets)?`verb ${(v.verbTargets||[]).map(i=>i+1).join(', ')}`:'',`phrases ${(v.phrases||[]).map(r=>`${r.start+1}-${r.end+1}`).join(', ')}`,`objects ${(v.objects||[]).map(i=>i+1).join(', ')}`,v.labelAnswer?`label ${v.labelAnswer}`:''].filter(Boolean).join('; ');
  else if(item.type==='diagram')return `<div class="answer"><strong>Answer:</strong> ${diagramAnswerHtml(item,v)}</div>`;
  return `<div class="answer"><strong>Answer:</strong> ${esc(text)}</div>`;
}function sortedRanges(ranges){return (ranges||[]).map(r=>({start:Number(r.start),end:Number(r.end)})).sort((a,b)=>a.start-b.start||a.end-b.end);}
function sameRanges(a,b){return JSON.stringify(sortedRanges(a))===JSON.stringify(sortedRanges(b));}
function sameObjectMap(a,b){const ak=Object.keys(a||{}).sort();const bk=Object.keys(b||{}).sort();if(!arrEq(ak,bk))return false;return ak.every(k=>sameSet(a[k],b[k]));}
function sameRoleMap(a,b){const clean=x=>Object.fromEntries(Object.entries(x||{}).map(([k,v])=>[String(k),String(v)]).sort(([a],[b])=>Number(a)-Number(b)));return JSON.stringify(clean(a))===JSON.stringify(clean(b));}
function textAnswer(got,expected){if(Array.isArray(expected))return expected.some(x=>norm(got)===norm(x));return norm(got)===norm(expected);}
function samePunct(a,b){const clean=x=>(x||[]).map(p=>`${Number(p.boundary)}:${String(p.mark)}`).sort();return arrEq(clean(a),clean(b));}
function isCorrect(item,v,a){
  if(!a)return false;
  if(item.type==='choice'){
    if(Array.isArray(v.items))return v.items.every((sub,i)=>Number(a.choices?.[i])===Number(sub.answer));
    return Number(a.choice)===Number(v.answer);
  }
  if(item.type==='proofread')return sameSet(a.caps,v.capitalized)&&samePunct(a.punct,v.punctuation);
  if(item.type==='short-answer'){
    if(Array.isArray(v.items))return v.items.every((sub,i)=>textAnswer(a.texts?.[i],sub.answer));
    return textAnswer(a.text,v.answer);
  }
  if(item.type==='edit-text')return textAnswer(a.text,v.answer);
  if(item.type==='word-mark')return sameSet(a.targets,v.targets);
  if(item.type==='comma')return sameSet(a.boundaries,v.commaBoundaries);
  if(['phrase','pattern','advprep'].includes(item.type)){
    const phraseOk=sameRanges(a.phrases,v.phrases);
    const objectOk=v.objects?sameSet(a.objects,v.objects):true;
    const subjectOk=Array.isArray(v.subjectTargets)?sameSet(a.subjects||[],v.subjectTargets):true;
    const verbMarkOk=Array.isArray(v.verbTargets)?sameSet(a.verbs||[],v.verbTargets):true;
    const verbOk=v.correctVerb?String(a.verb||'')===String(v.correctVerb):true;
    const patternOk=item.type==='pattern'?a.pattern===v.pattern:true;
    const advprepOk=item.type==='advprep'?a.advprep===v.answer:true;
    const labelOk=v.labelAnswer?String(a.label||'')===String(v.labelAnswer):true;
    return phraseOk&&objectOk&&subjectOk&&verbMarkOk&&verbOk&&patternOk&&advprepOk&&labelOk;
  }
  if(item.type==='diagram'){
    const expectedRoles=diagramExpectedRoles(v);
    const answerRolesMap=diagramAnswerRoles(a);
    const roleIds=new Set([...Object.keys(expectedRoles),...Object.keys(answerRolesMap)]);
    const rolesOk=[...roleIds].every(role=>sameSet(answerRolesMap[role]||[],expectedRoles[role]||[]));
    const slotsOk=diagramSlots(v).every(slot=>sameSet(a.assignments?.[slot.id]||[],slot.expected));
    const understoodOk=diagramUnderstoodOk(v,a);
    return (!v.pattern||a.pattern===v.pattern)&&(!v.basicShape||a.basicShape===v.basicShape)&&(!v.shape||a.shape===v.shape)&&rolesOk&&slotsOk&&understoodOk;
  }
  return false;
}function toggle(list,value){const i=list.indexOf(value);if(i>=0)list.splice(i,1);else list.push(value);}
function uniqueRanges(ranges){const seen=new Set();return ranges.filter(r=>{const k=`${r.start}-${r.end}`;if(seen.has(k))return false;seen.add(k);return true;});}
app.addEventListener('click',event=>{
  const btn=event.target.closest('[data-action]');
  if(!btn)return;
  event.preventDefault();
  const id=btn.dataset.id;
  const action=btn.dataset.action;
  const value=btn.dataset.value;
  const idx=Number(btn.dataset.index);
  const a=id?ensure(id):null;
  if(action==='check-item'){const item=findItem(id);if(item){state.checkedItems[id]=true;recordCheck(item);}state.showAnswers=false;render();return;}
  if(action==='reveal-answer'){if(answerUnlocked(id))state.revealedAnswers[id]=true;state.showAnswers=false;render();return;}
  if(action==='choice-sub'){if(!a.choices)a.choices={};a.choices[btn.dataset.index]=Number(value);}
  if(action==='choice')a.choice=Number(value);
  if(action==='proof-mode')a.mode=value;
  if(action==='proof-side')a.side=value;
  if(action==='proof-mark')a.mark=value;
  if(action==='proof-token'){if(a.mode==='cap')toggle(a.caps,idx);else togglePunct(a,a.side==='before'?idx:idx+1,a.mark||',',a.side||'after');}
  if(action==='clear-proofread'){a.caps=[];a.punct=[];}
  if(action==='toggle-token')toggle(a.targets,idx);
  if(action==='comma-mode')a.mode=value;
  if(action==='comma-token'){const boundary=a.mode==='before'?idx:idx+1;if(!a.boundarySides)a.boundarySides={};const existing=a.boundaries.indexOf(boundary);if(existing>=0){if(a.boundarySides[boundary]===a.mode){a.boundaries.splice(existing,1);delete a.boundarySides[boundary];}else a.boundarySides[boundary]=a.mode;}else{a.boundaries.push(boundary);a.boundarySides[boundary]=a.mode;}}
  if(action==='clear-commas'){a.boundaries=[];a.boundarySides={};}
  if(action==='phrase-mode'){a.mode=value;if(value==='object'||value==='subject'||value==='verb')a.phraseStart=null;}
  if(action==='phrase-token'){
    if(a.mode==='object')toggle(a.objects,idx);
    else if(a.mode==='subject')toggle(a.subjects,idx);
    else if(a.mode==='verb')toggle(a.verbs,idx);
    else if(a.phraseStart===null||a.phraseStart===undefined)a.phraseStart=idx;
    else{const start=Math.min(a.phraseStart,idx);const end=Math.max(a.phraseStart,idx);a.phrases=uniqueRanges([...a.phrases,{start,end,type:'prepositional'}]);a.phraseStart=null;}
  }
  if(action==='clear-phrases'){a.phrases=[];a.phraseStart=null;}
  if(action==='phrase-range-token'){
    if(a.phraseStart===null||a.phraseStart===undefined)a.phraseStart=idx;
    else{const start=Math.min(a.phraseStart,idx);const end=Math.max(a.phraseStart,idx);a.phrases=uniqueRanges([...a.phrases,{start,end,type:'prepositional'}]);a.phraseStart=null;}
  }
  if(action==='phrase-subject-token')toggle(a.subjects,idx);
  if(action==='phrase-object-token')toggle(a.objects,idx);
  if(action==='phrase-verb-token')toggle(a.verbs,idx);
  if(action==='clear-objects')a.objects=[];
  if(action==='clear-subjects')a.subjects=[];
  if(action==='clear-verbs')a.verbs=[];
  if(action==='remove-phrase')a.phrases.splice(idx,1);
  if(action==='remove-object')toggle(a.objects,idx);
  if(action==='remove-subject')toggle(a.subjects,idx);
  if(action==='remove-verb')toggle(a.verbs,idx);
  if(action==='set-pattern')a.pattern=value;
  if(action==='set-advprep')a.advprep=value;
  if(action==='set-label')a.label=value;
  if(action==='set-verb-choice')a.verb=value;
  if(action==='diagram-pattern')a.pattern=a.pattern===value?'':value;
  if(action==='diagram-basic'){const next=a.basicShape===value?'':value;a.basicShape=next;a.shape='';a.assignments={};a.selectedWord=null;}
  if(action==='diagram-shape'){const next=a.shape===value?'':value;a.shape=next;if(next)a.basicShape=diagramBasicForShape(next);a.assignments={};a.selectedWord=null;}
  if(action==='diagram-role-mode'){a.selectedRole=value;}
  if(action==='diagram-role-token'){
    if(!a.roles)a.roles={};
    const selectedRole=a.selectedRole||'S';
    if(selectedRole==='CLEAR'){
      for(const key of Object.keys(a.roles))a.roles[key]=(a.roles[key]||[]).filter(n=>Number(n)!==idx);
    }else{
      if(!a.roles[selectedRole])a.roles[selectedRole]=[];
      toggle(a.roles[selectedRole],idx);
      a.roles[selectedRole]=[...new Set(a.roles[selectedRole])].sort((x,y)=>x-y);
    }
  }
  if(action==='diagram-word')a.selectedWord=a.selectedWord===idx?null:idx;
  if(action==='diagram-understood-word')a.selectedWord=a.selectedWord===idx?null:idx;
  if(action==='diagram-target'){
    if(!a.assignments)a.assignments={};
    const slot=btn.dataset.slot;
    if(a.selectedWord===undefined||a.selectedWord===null)delete a.assignments[slot];
    else{a.assignments[slot]=[Number(a.selectedWord)];a.selectedWord=null;}
    a.selectedTarget=slot;
  }
  render();
});
app.addEventListener('input',event=>{
  const el=event.target;
  if(!el.dataset||!el.dataset.input)return;
  const a=ensure(el.dataset.id);
  if(el.dataset.input==='edit')a.text=el.value;
  if(el.dataset.input==='short'){
    if(el.dataset.index!==undefined)a.texts[el.dataset.index]=el.value;
    else a.text=el.value;
  }
  if(el.dataset.input==='diagram-understood'){
    if(!a.understood)a.understood={};
    a.understood[el.dataset.key]=el.value;
  }
});
document.getElementById('checkAllBtn').addEventListener('click',()=>{state.checkedAll=true;state.showAnswers=false;for(const {item} of allItems())recordCheck(item);render();});
document.getElementById('resetBtn').addEventListener('click',newRun);
document.getElementById('answersBtn').addEventListener('click',()=>{state.showAnswers=!state.showAnswers;render();});
newRun();
</script>
